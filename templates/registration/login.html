<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | EMS Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #212529; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; padding: 2rem; border-radius: 1rem; }
    </style>
</head>
<body>
    <div class="card login-card shadow-lg">
        <h3 class="text-center mb-4">EMS Pro Login</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
        </form>
        {% if form.errors %}
            <div class="alert alert-danger mt-3 py-2 small">Invalid credentials.</div>
        {% endif %}
    </div>
</body>
</html>
